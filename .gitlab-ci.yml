stages:
  - test

render_check:
  stage: test
  image: alpine:3
  before_script:
    - apk add --no-cache bash git
  script:
    - ./tools/render.sh
    - git add -N approx_count.control install.sql
    - git diff --exit-code -- approx_count.control install.sql

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

postgres_matrix:
  stage: test
  image: docker:28.0.1-cli
  services:
    - name: docker:28.0.1-dind
      alias: docker
  parallel:
    matrix:
      - PG_MAJOR: ["14", "15", "16", "17", "18"]
  before_script:
    - apk add --no-cache bash
  script:
    - ./ci/run_postgres_matrix.sh "${PG_MAJOR}"

# PostgreSQL 19 is still in beta; run it for early signal without blocking the pipeline.
postgres_beta:
  stage: test
  image: docker:28.0.1-cli
  services:
    - name: docker:28.0.1-dind
      alias: docker
  variables:
    PG_MAJOR: "19"
  allow_failure: true
  before_script:
    - apk add --no-cache bash
  script:
    - ./ci/run_postgres_matrix.sh "${PG_MAJOR}"
